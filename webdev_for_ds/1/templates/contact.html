<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- Navbar -->
  <header class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-indigo-600">BrandName</h1>
      <nav class="space-x-6">
        <a href="index.html" class="hover:text-indigo-600">Home</a>
        <a href="about.html" class="hover:text-indigo-600">About</a>
        <a href="contact.html" class="text-indigo-600 font-semibold">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Header Section -->
  <section class="bg-indigo-600 text-white py-16 text-center">
    <h2 class="text-4xl font-bold mb-4">Get In Touch</h2>
    <p class="text-lg">We’d love to hear from you!</p>
  </section>

  <!-- Contact Form -->
  <section class="py-16">
    <div class="max-w-3xl mx-auto px-6">
      <form class="bg-white p-8 rounded-xl shadow space-y-6">

        <div>
          <label class="block mb-2 font-medium">Full Name</label>
          <input type="text"
                 class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-400 focus:outline-none"
                 placeholder="Your Name">
        </div>

        <div>
          <label class="block mb-2 font-medium">Email Address</label>
          <input type="email"
                 class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-400 focus:outline-none"
                 placeholder="you@example.com">
        </div>

        <div>
          <label class="block mb-2 font-medium">Message</label>
          <textarea rows="5"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-400 focus:outline-none"
                    placeholder="Write your message..."></textarea>
        </div>

        <button class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">
          Send Message
        </button>

      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-800 text-gray-300 py-6 text-center">
    <p>© 2026 BrandName. All rights reserved.</p>
  </footer>

</body>
</html>
