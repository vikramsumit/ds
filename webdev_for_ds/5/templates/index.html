<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Random Creative Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00cec9;
            --dark: #2d3436;
            --light: #f5f6fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px;
            text-align: center;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            color: var(--light);
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--dark);
        }

        main {
            flex: 1;
            display: grid;
            place-items: center;
            padding: 40px 20px;
            text-align: center;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: var(--light);
            color: var(--dark);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: var(--dark);
            color: var(--light);
        }

        footer {
            text-align: center;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<header>
    <h1>✨ Welcome to My Random Page</h1>

    <nav>
        <a href="#">Home</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
    </nav>
</header>

<main>
        <h2>{{name}}</h2>
    <h2>{{lang}}</h2>
    <div class="card">
        <h2 id="random-title">Click the Button!</h2>
        <p id="random-text">Press the button below to generate a random fact.</p>
        <button onclick="generateFact()">Generate Random Fact</button>
    </div>
</main>

<footer>
    &copy; 2026 Random Creative Page. All rights reserved.
</footer>

<script>
    const facts = [
        "Honey never spoils.",
        "Octopuses have three hearts.",
        "Bananas are berries, but strawberries aren't.",
        "A day on Venus is longer than a year on Venus.",
        "Sharks existed before trees."
    ];

    function generateFact() {
        const randomIndex = Math.floor(Math.random() * facts.length);
        document.getElementById("random-title").innerText = "🌟 Random Fact";
        document.getElementById("random-text").innerText = facts[randomIndex];
    }
</script>

</body>
</html>
