<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">

  <div class="bg-white w-full max-w-xl p-10 rounded-lg shadow-md border border-gray-200">

    <h2 class="text-2xl font-serif font-semibold text-center text-gray-800 mb-8">
      Contact Us
    </h2>

    <form method="POST" action="/" class="space-y-6">

      <!-- Full Name -->
      <div>
        <label class="block text-gray-700 font-medium mb-2">
          Full Name
        </label>
        <input 
          type="text"
          name="full_name"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-gray-600 focus:ring-1 focus:ring-gray-400 transition"
          placeholder="Enter your full name">
      </div>

      <!-- Email -->
      <div>
        <label class="block text-gray-700 font-medium mb-2">
          Email Address
        </label>
        <input 
          type="email"
          name="email"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-gray-600 focus:ring-1 focus:ring-gray-400 transition"
          placeholder="you@example.com">
      </div>

      <!-- Phone -->
      <div>
        <label class="block text-gray-700 font-medium mb-2">
          Phone Number
        </label>
        <input 
          type="tel"
          name="phone"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-gray-600 focus:ring-1 focus:ring-gray-400 transition"
          placeholder="+1 234 567 890">
      </div>

      <!-- Subject -->
      <div>
        <label class="block text-gray-700 font-medium mb-2">
          Subject
        </label>
        <select 
          name="subject"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-md bg-white focus:outline-none focus:border-gray-600 focus:ring-1 focus:ring-gray-400 transition">
          <option value="">Select a subject</option>
          <option>General Inquiry</option>
          <option>Support</option>
          <option>Partnership</option>
          <option>Feedback</option>
        </select>
      </div>

      <!-- Message -->
      <div>
        <label class="block text-gray-700 font-medium mb-2">
          Message
        </label>
        <textarea 
          name="message"
          rows="4"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-gray-600 focus:ring-1 focus:ring-gray-400 transition"
          placeholder="Write your message here..."></textarea>
      </div>

      <!-- Checkbox -->
      <div class="flex items-center">
        <input type="checkbox" name="agree" required class="h-4 w-4 text-gray-700 border-gray-300 rounded">
        <label class="ml-2 text-gray-600 text-sm">
          I agree to the terms and conditions
        </label>
      </div>

      <!-- Button -->
      <div>
        <button 
          type="submit"
          class="w-full bg-gray-800 text-white py-2 rounded-md hover:bg-gray-700 transition duration-300">
          Submit
        </button>
      </div>

    </form>

  </div>

</body>
</html>
